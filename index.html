<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asian Plus Travel — Share Your Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-1:#1b3c8f;
    --blue-2:#102a66;
    --blue-3:#0a1f4d;
    --gold-1:#f6e0a0;
    --gold-2:#e0b75a;
    --gold-3:#bb8d34;
    --google:#4285F4;
    --facebook:#1877F2;
    --ink:#1d2733;
    --muted:#7c8794;
    --line:#e7ebf1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Montserrat','Sarabun','Segoe UI',Tahoma,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.06), transparent 40%),
      linear-gradient(160deg,var(--blue-1) 0%,var(--blue-2) 50%,var(--blue-3) 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:28px 18px;
  }
  .card{
    background:#fff;width:100%;max-width:440px;border-radius:26px;overflow:hidden;
    box-shadow:0 30px 70px rgba(6,18,45,.45);
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  .head{
    background:
      radial-gradient(circle at 80% -10%, rgba(255,255,255,.10), transparent 50%),
      linear-gradient(155deg,var(--blue-1) 0%,var(--blue-2) 60%,var(--blue-3) 100%);
    padding:38px 28px 30px;text-align:center;position:relative;
  }
  .head:after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:4px;
    background:linear-gradient(90deg,var(--gold-3),var(--gold-1),var(--gold-3));
  }
  .logo{
    font-weight:900;letter-spacing:1.5px;line-height:1.02;
    font-size:33px;text-transform:uppercase;
    background:linear-gradient(180deg,var(--gold-1) 0%,var(--gold-2) 55%,var(--gold-3) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    text-shadow:0 1px 0 rgba(0,0,0,.15);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
  }
  .logo small{display:block;font-size:inherit;font-weight:inherit;letter-spacing:inherit;}
  .tagline{
    margin-top:12px;color:rgba(255,255,255,.78);
    font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;
  }
  .body{padding:30px 28px 26px;text-align:center;}
  .stars{font-size:26px;letter-spacing:5px;margin-bottom:14px;
    background:linear-gradient(180deg,var(--gold-1),var(--gold-3));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  h1{font-size:22px;font-weight:800;color:var(--blue-2);margin-bottom:9px;line-height:1.3;}
  .sub{font-size:14.5px;color:var(--muted);line-height:1.6;margin-bottom:26px;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:13px;
    width:100%;padding:15px 16px;border-radius:14px;border:none;cursor:pointer;
    font-size:16px;font-weight:700;color:#fff;text-decoration:none;
    font-family:inherit;margin-bottom:13px;
    box-shadow:0 6px 16px rgba(16,42,102,.10);
    transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(16,42,102,.22);filter:brightness(1.03);}
  .btn:active{transform:translateY(0);}
  .btn-google{background:linear-gradient(135deg,#4285F4,#356ac3);}
  .btn-facebook{background:linear-gradient(135deg,#1877F2,#0d5fd0);}
  .btn .ic{background:#fff;border-radius:7px;padding:4px;display:flex;flex:0 0 auto;}
  .btn .ic svg{width:22px;height:22px;display:block;}
  .note{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.6;}
  .langbar{
    display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
    margin-top:22px;padding-top:20px;border-top:1px solid var(--line);
  }
  .langbar button{
    border:1px solid var(--line);background:#fff;color:var(--muted);
    font-family:inherit;font-size:12.5px;font-weight:600;
    padding:6px 13px;border-radius:30px;cursor:pointer;
    transition:all .15s ease;
  }
  .langbar button:hover{border-color:var(--blue-1);color:var(--blue-1);}
  .langbar button.active{
    background:var(--blue-2);color:#fff;border-color:var(--blue-2);
    box-shadow:0 4px 10px rgba(16,42,102,.25);
  }
  .foot{
    background:#f7f9fc;text-align:center;padding:14px 18px;
    font-size:11px;color:#9aa6b4;letter-spacing:.4px;border-top:1px solid var(--line);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">Asian Plus<small>Travel</small></div>
      <div class="tagline" id="tagline">Thailand Leading Tour Operator</div>
    </div>
    <div class="body">
      <div class="stars">★ ★ ★ ★ ★</div>
      <h1 id="title"></h1>
      <p class="sub" id="sub"></p>
      <a class="btn btn-google" href="https://www.google.com/maps?cid=16740436379545267680" target="_blank" rel="noopener">
        <span class="ic">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        </span>
        <span id="btn-google"></span>
      </a>
      <a class="btn btn-facebook" href="https://www.facebook.com/AsianPlusTravelService/reviews" target="_blank" rel="noopener">
        <span class="ic">
          <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07c0 6.03 4.39 11.03 10.13 11.93v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.25h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/></svg>
        </span>
        <span id="btn-facebook"></span>
      </a>
      <p class="note" id="note"></p>
      <div class="langbar" id="langbar"></div>
    </div>
    <div class="foot">Asian Plus Travel &amp; Service Co., Ltd. · Chiang Mai, Thailand</div>
  </div>
<script>
  const SLOGAN = "Your Trusted Travel Partner in Thailand";
  const T = {
    en:{ name:"English", tag:SLOGAN,
      title:"Share Your Experience",
      sub:"Thank you for traveling with us. Your review takes just a minute and means a lot to our team.",
      google:"Review on Google", facebook:"Review on Facebook",
      note:"Tapping a button takes you straight to the review page 🙏" },
    th:{ name:"ไทย", tag:SLOGAN,
      title:"แบ่งปันประสบการณ์ของคุณ",
      sub:"ขอบคุณที่เดินทางกับเรา รีวิวใช้เวลาแค่ 1 นาที และมีค่ากับทีมงานมาก",
      google:"รีวิวบน Google", facebook:"รีวิวบน Facebook",
      note:"กดปุ่มแล้วระบบจะพาไปหน้าเขียนรีวิวให้เลย 🙏" },
    fr:{ name:"Français", tag:SLOGAN,
      title:"Partagez votre expérience",
      sub:"Merci d'avoir voyagé avec nous. Votre avis ne prend qu'une minute et compte beaucoup pour notre équipe.",
      google:"Avis sur Google", facebook:"Avis sur Facebook",
      note:"Le bouton vous mène directement à la page d'avis 🙏" },
    es:{ name:"Español", tag:SLOGAN,
      title:"Comparte tu experiencia",
      sub:"Gracias por viajar con nosotros. Tu reseña solo toma un minuto y significa mucho para nuestro equipo.",
      google:"Reseña en Google", facebook:"Reseña en Facebook",
      note:"El botón te lleva directo a la página de reseñas 🙏" },
    de:{ name:"Deutsch", tag:SLOGAN,
      title:"Teilen Sie Ihr Erlebnis",
      sub:"Danke, dass Sie mit uns gereist sind. Ihre Bewertung dauert nur eine Minute und bedeutet unserem Team viel.",
      google:"Bei Google bewerten", facebook:"Bei Facebook bewerten",
      note:"Der Button führt Sie direkt zur Bewertungsseite 🙏" }
  };
  const order = ["en","th","fr","es","de"];
  function setLang(code){
    const t=T[code];
    document.documentElement.lang=code;
    document.getElementById("tagline").textContent=t.tag;
    document.getElementById("title").textContent=t.title;
    document.getElementById("sub").textContent=t.sub;
    document.getElementById("btn-google").textContent=t.google;
    document.getElementById("btn-facebook").textContent=t.facebook;
    document.getElementById("note").textContent=t.note;
    document.querySelectorAll("#langbar button").forEach(b=>b.classList.toggle("active",b.dataset.code===code));
  }
  const bar=document.getElementById("langbar");
  order.forEach(code=>{
    const b=document.createElement("button");
    b.textContent=T[code].name;b.dataset.code=code;b.onclick=()=>setLang(code);
    bar.appendChild(b);
  });
  setLang("en");
</script>
</body>
</html>
